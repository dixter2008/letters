<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pic with words</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: pink;
            font-family: Arial, sans-serif;
        }
        .container {
            position: relative;
            max-width: 90%;   /* shrink container on small screens */
        }

        img {
            width: 100%;      /* responsive image */
            height: auto;     /* keep aspect ratio */
            box-shadow: black 0px 0px 10px;
            border-radius: 8px;
        }

        .word {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px black;
        }

        /* Default positions */
        .w1 { top: 5%; left: 5%; }
        .w2 { top: 20%; right: 5%; }
        .w3 { bottom: 15%; left: 10%; }
        .w4 { bottom: 5%; right: 10%; }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .word {
                font-size: 14px;   /* smaller text on mobile */
            }
            .w1 { top: 8%; left: 8%; }
            .w2 { top: 25%; right: 8%; }
            .w3 { bottom: 20%; left: 12%; }
            .w4 { bottom: 8%; right: 12%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="hhahhaa.jpg" alt="Image">
        <div class="word w1">sige naaaa</div>
        <div class="word w2">Bati na tayo plss</div>
        <div class="word w3">I Love youuuu</div>
        <div class="word w4">Sorry na plsss</div>
    </div>
</body>
</html>
