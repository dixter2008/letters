<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pic with words</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: pink;
            font-family: Arial, sans-serif;
        }
        .container {
            position: relative;
        }

        .container p {
            color: pink;
        }
        img {
            width: 460px;
            height: 600px;
            box-shadow: black 0px 0px 10px;
        }
        .word {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px black;
        }
        .w1 { top: 20px; left: 30px; }
        .w2 { top: 100px; right: 40px; }
        .w3 { bottom: 50px; left: 60px; }
        .w4 { bottom: 20px; right: 80px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="hhahhaa.jpg" alt="Image">
        <div class="word w1"><p>sige naaaa</p></div>
        <div class="word w2"><p>Bati na tayo plss</p></div>
        <div class="word w3"><p>I Love youuuu</p></div>
        <div class="word w4"><p>Sorry na plsss</p></div>
    </div>
</body>
</html>
